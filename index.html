<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeerPlex — Connexion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
  <h1>⚡ PeerPlex</h1>
  <p class="subtitle">Connexion à votre compte</p>

  <div id="errorBox" style="display:none;margin-bottom:16px;background:rgba(224,92,92,.1);border:1px solid #e05c5c;border-radius:10px;padding:14px 16px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-size:16px">⚠️</span>
      <strong style="font-size:14px;color:#e05c5c" id="errorTitle"></strong>
    </div>
    <p style="font-size:13px;color:#c0c0c0;margin-bottom:8px" id="errorDesc"></p>
    <div style="font-family:monospace;font-size:11px;color:#888;background:rgba(0,0,0,.3);border-radius:6px;padding:8px;word-break:break-all;display:none" id="errorDetail"></div>
  </div>

  <form id="loginForm">
    <div class="field">
      <label>Nom d'utilisateur</label>
      <input id="username" placeholder="Nom d'utilisateur" autocomplete="username" required>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input id="password" type="password" placeholder="Mot de passe" autocomplete="current-password" required>
    </div>
    <button type="submit" id="submitBtn">Se connecter</button>
  </form>
</div>

<script>
const API_URL = "https://siteweb-production-8e78.up.railway.app";

const ERRORS = {
  network: {
    title: "Serveur injoignable",
    desc: "Impossible de contacter le serveur Railway. Vérifiez votre connexion ou réessayez dans quelques secondes."
  },
  401: {
    title: "Identifiants incorrects",
    desc: "Nom d'utilisateur ou mot de passe invalide."
  },
  403: {
    title: "Accès refusé",
    desc: "Votre compte n'a pas les droits nécessaires."
  },
  500: {
    title: "Erreur serveur",
    desc: "Le serveur a rencontré un problème interne. Réessayez dans un moment."
  },
  unknown: {
    title: "Erreur inattendue",
    desc: "Une erreur inconnue s'est produite."
  }
};

function showError(type, detail = "") {
  const e = ERRORS[type] || ERRORS.unknown;
  document.getElementById("errorTitle").textContent = e.title;
  document.getElementById("errorDesc").textContent = e.desc;
  const detailEl = document.getElementById("errorDetail");
  detailEl.textContent = detail;
  detailEl.style.display = detail ? "block" : "none";
  document.getElementById("errorBox").style.display = "block";
}

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  document.getElementById("errorBox").style.display = "none";
  btn.disabled = true;
  btn.textContent = "Connexion...";

  try {
    const res = await fetch(API_URL + "/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
      })
    });

    const data = await res.json();

    if (!res.ok) {
      showError(res.status, `HTTP ${res.status} — ${data.error || "pas de détail"}`);
      btn.disabled = false;
      btn.textContent = "Se connecter";
      return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("username", data.user.username);
    localStorage.setItem("role", data.user.role);
    localStorage.setItem("apiUrl", API_URL);
    location.href = data.user.role === "admin" ? "admin.html" : "app.html";

  } catch (err) {
    const isNetwork = err instanceof TypeError && err.message.includes("fetch");
    showError(isNetwork ? "network" : "unknown", err.message);
    btn.disabled = false;
    btn.textContent = "Se connecter";
  }
});
</script>
</body>
</html>
